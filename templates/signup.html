<div class="auth-container">
    <div class="auth-card signup-card">
        <h2>Crie sua conta</h2>
        <form>
            <div class="input-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" required placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Crie uma senha">
            </div>
            
            <button type="submit" class="btn signup-btn">Cadastrar</button>
        </form>
        <p class="auth-link link-green">Já tem uma conta? <a href="#login">Entre aqui</a></p>
    </div>
</div>
