<div class="auth-container">
    <div class="auth-card">
        <h2>Acesse sua conta</h2>
        <form>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="btn login-btn">Entrar</button>
        </form>
        <p class="auth-link link-blue">Não tem uma conta? <a href="#signup">Cadastre-se</a></p>
    </div>
</div>
